<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Teleprompter - SpeedRead</title>
        <link rel="stylesheet" href="../styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../speedread/index.html">SpeedRead</a></li>
                <li><a href="index.html" aria-current="page">Teleprompter</a></li>
            </ul>
        </nav>
        <main>
            <h1>Teleprompter</h1>
            <div id="controls">
                <textarea id="textInput" placeholder="Enter your script here..." rows="10"></textarea>
                <div class="tp-controls-row">
                    <div class="tp-control-group">
                        <label for="speedInput">Speed (WPM)</label>
                        <input type="number" id="speedInput" value="150" min="30" max="600">
                    </div>
                    <div class="tp-control-group">
                        <label for="fontSizeInput">Font Size (px)</label>
                        <input type="number" id="fontSizeInput" value="48" min="24" max="120">
                    </div>
                </div>
                <button id="startBtn">Start Teleprompter</button>
            </div>

            <div id="teleprompterContainer" class="teleprompter-display" style="display: none;">
                <div id="textScroller" class="tp-scroller">
                    <div id="teleprompterText" class="tp-text"></div>
                    <div class="tp-end-pad"></div>
                </div>
                <div class="tp-bar">
                    <button id="pauseBtn" class="tp-btn">Pause</button>
                    <button id="stopBtn" class="tp-btn tp-btn-stop">Stop</button>
                    <div class="tp-speed-control">
                        <label for="liveSpeed">Speed</label>
                        <input type="range" id="liveSpeed" min="30" max="600" value="150">
                        <span id="liveSpeedVal">150 WPM</span>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p>Made with ❤️ by @sharmnten</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
